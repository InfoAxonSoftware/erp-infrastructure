[options]

; ── Paths ─────────────────────────────────────────────────────────────────────
; The official Odoo Docker image places core addons in the package directory.
; /mnt/extra-addons is for your own custom modules.
addons_path     = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
data_dir        = /var/lib/odoo

; ── Database (credentials injected at runtime via entrypoint.sh) ──────────────
; db_host, db_port, db_user, db_password are set by the Docker environment
; variables HOST, PORT, USER, PASSWORD via the official Odoo entrypoint.
db_maxconn      = 64

; ── Multi-tenant SaaS ─────────────────────────────────────────────────────────
; %d = first subdomain component of the request hostname.
; company1.yourerp.com  →  database "company1"
dbfilter        = ^%d$

; Disable the public database listing/selector (security: never expose in SaaS)
list_db         = False

; ── Security ──────────────────────────────────────────────────────────────────
; Substituted at container start by docker/odoo/entrypoint.sh
admin_passwd    = ODOO_ADMIN_PASSWORD_PLACEHOLDER

; ── Reverse proxy ─────────────────────────────────────────────────────────────
proxy_mode      = True

; ── Worker processes ──────────────────────────────────────────────────────────
; Formula: (2 × CPU cores) + 1  — tune for your VPS size.
; Set to 0 to disable multi-processing (use for development only).
workers                 = 4
max_cron_threads        = 2

; ── Memory limits (bytes) ─────────────────────────────────────────────────────
limit_memory_hard       = 2684354560
limit_memory_soft       = 2147483648

; ── Request limits ────────────────────────────────────────────────────────────
limit_request           = 8192
limit_time_cpu          = 60
limit_time_real         = 120
limit_time_real_cron    = -1

; ── Longpolling (Discuss / live chat) ─────────────────────────────────────────
gevent_port     = 8072

; ── Logging ───────────────────────────────────────────────────────────────────
logfile         = /var/log/odoo/odoo.log
log_level       = warn
log_handler     = :WARNING
