[options]

; ── Paths ─────────────────────────────────────────────────────────────────────
; The official Odoo Docker image places core addons in the package directory.
; /mnt/extra-addons is for your own custom modules.
addons_path     = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
data_dir        = /var/lib/odoo

; ── Database (credentials injected at runtime via entrypoint.sh) ──────────────
; db_host, db_port, db_user, db_password are set by the Docker environment
; variables HOST, PORT, USER, PASSWORD via the official Odoo entrypoint.
db_maxconn      = 16

; ── Demo database routing ─────────────────────────────────────────────────────
; This VPS runs one Odoo demo database. A fixed filter keeps direct IP access
; working while preventing accidental exposure of other databases.
dbfilter        = ^infoaxon_erp$

; Disable public database listing/selector.
list_db         = False

; ── Security ──────────────────────────────────────────────────────────────────
; Substituted at container start by docker/odoo/entrypoint.sh
admin_passwd    = ODOO_ADMIN_PASSWORD_PLACEHOLDER

; ── Reverse proxy ─────────────────────────────────────────────────────────────
proxy_mode      = True

; ── Worker processes ──────────────────────────────────────────────────────────
; Tuned for the current 1 vCPU / 2 GB RAM VPS.
workers                 = 1
max_cron_threads        = 1

; ── Memory limits (bytes) ─────────────────────────────────────────────────────
limit_memory_soft       = 805306368
limit_memory_hard       = 1073741824

; ── Request limits ────────────────────────────────────────────────────────────
limit_request           = 8192
limit_time_cpu          = 60
limit_time_real         = 120
limit_time_real_cron    = -1

; ── Longpolling (Discuss / live chat) ─────────────────────────────────────────
gevent_port     = 8072

; ── Logging ───────────────────────────────────────────────────────────────────
logfile         = /var/log/odoo/odoo.log
log_level       = warn
log_handler     = :WARNING
