[options]

; ── Paths ─────────────────────────────────────────────────────────────────────
; The official Odoo Docker image places core addons in the package directory.
; /mnt/extra-addons is for your own custom modules.
addons_path     = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons
data_dir        = /var/lib/odoo

; ── Database (credentials injected at runtime via entrypoint.sh) ──────────────
; db_host, db_port, db_user, db_password are set by the Docker environment
; variables HOST, PORT, USER, PASSWORD via the official Odoo entrypoint.
db_maxconn      = 16

; ── Demo database routing ─────────────────────────────────────────────────────
; This VPS is used for development and client demonstrations, where admins
; create and switch between multiple Odoo databases.
dbfilter        = .*

; Intentionally enabled for development/demo database management.
list_db         = True

; ── Security ──────────────────────────────────────────────────────────────────
; Substituted at container start by docker/odoo/entrypoint.sh
admin_passwd    = ODOO_ADMIN_PASSWORD_PLACEHOLDER

; ── Reverse proxy ─────────────────────────────────────────────────────────────
proxy_mode      = False

; ── Worker processes ──────────────────────────────────────────────────────────
; Single-process mode is intentional for direct-IP demos on 1 vCPU / 2 GB RAM.
workers                 = 0
max_cron_threads        = 1

; ── Memory limits (bytes) ─────────────────────────────────────────────────────
limit_memory_soft       = 671088640
limit_memory_hard       = 838860800

; ── Request limits ────────────────────────────────────────────────────────────
limit_request           = 8192
limit_time_cpu          = 600
limit_time_real         = 1200
limit_time_real_cron    = -1

; ── Longpolling (Discuss / live chat) ─────────────────────────────────────────
gevent_port     = 8072

; ── Logging ───────────────────────────────────────────────────────────────────
logfile         = /var/log/odoo/odoo.log
log_level       = warn
log_handler     = :WARNING
