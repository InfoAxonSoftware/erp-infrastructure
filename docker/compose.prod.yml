services:

  postgres:
    restart: unless-stopped
    cpus: '0.30'
    mem_limit: 384m
    mem_reservation: 256m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  odoo:
    restart: unless-stopped
    cpus: '0.80'
    mem_limit: 1100m
    mem_reservation: 768m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  react:
    restart: unless-stopped
    cpus: '0.15'
    mem_limit: 160m
    mem_reservation: 64m
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  nginx:
    restart: unless-stopped
    cpus: '0.20'
    mem_limit: 160m
    mem_reservation: 64m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
