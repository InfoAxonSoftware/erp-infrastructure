name: erp-platform

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  odoo_data:
    driver: local
  odoo_filestore:
    driver: local

services:

  postgres:
    image: postgres:16-alpine
    container_name: erp-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-odoo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - backend
    command: >
      postgres
      -c max_connections=40
      -c shared_buffers=128MB
      -c effective_cache_size=768MB
      -c maintenance_work_mem=32MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=8MB
      -c random_page_cost=1.1
      -c effective_io_concurrency=100
      -c work_mem=2MB
      -c min_wal_size=80MB
      -c max_wal_size=1GB
      -c log_min_duration_statement=1000
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  odoo:
    build:
      context: ./odoo
      dockerfile: Dockerfile
    container_name: erp-odoo
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HOST: postgres
      PORT: 5432
      USER: ${POSTGRES_USER:-odoo}
      PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      ODOO_ADMIN_PASSWORD: ${ODOO_ADMIN_PASSWORD:?ODOO_ADMIN_PASSWORD is required}
    volumes:
      - odoo_data:/var/lib/odoo
      - odoo_filestore:/var/lib/odoo/filestore
      - ../config/odoo/odoo.conf:/etc/odoo/odoo.conf:ro
      - ../logs/odoo:/var/log/odoo
    ports:
      - "8069:8069"
    expose:
      - "8072"
    networks:
      - backend
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8069/web/health || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s

  react:
    build:
      context: ./react
      dockerfile: Dockerfile
    container_name: erp-react
    networks:
      - frontend

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: erp-nginx
    depends_on:
      react:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-infoaxon.lk}
      NGINX_ENVSUBST_TEMPLATE_DIR: /etc/nginx/templates/${NGINX_TEMPLATE_PROFILE:-http}
    volumes:
      - ../config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../config/nginx/templates:/etc/nginx/templates:ro
      - ../logs/nginx:/var/log/nginx
      - ../ssl:/etc/nginx/ssl:ro
      - ../ssl/certbot/www:/var/www/certbot:ro
    networks:
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
