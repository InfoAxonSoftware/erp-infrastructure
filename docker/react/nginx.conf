server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # ── Health check (used by Docker and nginx container) ─────────────────────
    location = /health {
        access_log  off;
        return 200  "healthy\n";
        add_header  Content-Type  text/plain;
    }

    # ── React SPA: all unknown paths → index.html ─────────────────────────────
    location / {
        try_files  $uri  $uri/  /index.html;
    }

    # ── Aggressively cache immutable hashed assets (JS/CSS chunks) ────────────
    location ~* \.(js|css|woff|woff2|ttf|eot)$ {
        expires             1y;
        add_header          Cache-Control  "public, immutable";
        access_log          off;
    }

    # ── Cache images and other static media ───────────────────────────────────
    location ~* \.(png|jpg|jpeg|gif|svg|ico|webp|avif)$ {
        expires             30d;
        add_header          Cache-Control  "public, no-transform";
        access_log          off;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header  X-Frame-Options         "SAMEORIGIN"                    always;
    add_header  X-Content-Type-Options  "nosniff"                       always;
    add_header  X-XSS-Protection        "1; mode=block"                 always;
    add_header  Referrer-Policy         "strict-origin-when-cross-origin" always;
}
